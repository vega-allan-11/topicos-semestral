name: 2-build
on:
  workflow_dispatch:

env:
  ACR_NAME: acrinventario20260706
  IMAGE: inventory

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias y correr pruebas
        run: |
          pip install -r app/requirements.txt
          cd app && python -m pytest -q

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build y Push a ACR
        run: |
          TAG=v${{ github.run_number }}
          az acr login --name $ACR_NAME
          SERVER=$ACR_NAME.azurecr.io
          docker build -t $SERVER/$IMAGE:$TAG -t $SERVER/$IMAGE:latest .
          docker push $SERVER/$IMAGE:$TAG
          docker push $SERVER/$IMAGE:latest
          echo "Imagen publicada: $SERVER/$IMAGE:$TAG"
