name: 3-deploy
on:
  workflow_dispatch:

env:
  RG: rg-final-pipelines
  ACR_NAME: acrinventario20260706
  IMAGE: inventory
  ACI_NAME: aci-inventario

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Crear/actualizar ACI
        run: |
          SERVER=$ACR_NAME.azurecr.io
          SUBNET_ID=$(az network vnet subnet show \
            -g $RG --vnet-name vnet-final -n subnet-aci --query id -o tsv)

          # Recrear para tomar la ultima imagen (ACI no soporta update de imagen en VNet)
          az container delete -g $RG -n $ACI_NAME --yes 2>/dev/null || true

          az container create \
            --resource-group $RG \
            --name $ACI_NAME \
            --image $SERVER/$IMAGE:latest \
            --registry-login-server $SERVER \
            --registry-username ${{ secrets.ACR_USER }} \
            --registry-password ${{ secrets.ACR_PASS }} \
            --subnet $SUBNET_ID \
            --ports 80 \
            --environment-variables APP_ENV=prod DB_PATH=/app/inventory.db \
            --os-type Linux --cpu 1 --memory 1

      - name: Verificar estado y direccion
        run: |
          echo "Estado:"
          az container show -g $RG -n $ACI_NAME --query "instanceView.state" -o tsv
          echo "IP privada (dentro de la VNet):"
          az container show -g $RG -n $ACI_NAME --query "ipAddress.ip" -o tsv
